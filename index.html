<!DOCTYPE html>
<html>
<head>
  <style> body { margin: 0; background-color: #000; } </style>
  <script src="https://unpkg.com/3d-force-graph"></script>
</head>
<body>
  <div id="3d-graph"></div>
  <script>
    // 这里的 data 就是你的“货”，以后想卖什么就把这里改掉
    const data = {
      nodes: [
        { id: '点1', name: '口腔医学项目', color: 'red' },
        { id: '点2', name: 'Vibe Coding', color: 'green' }
      ],
      links: [
        { source: '点1', target: '点2' }
      ]
    };

    const Graph = ForceGraph3D()(document.getElementById('3d-graph'))
      .graphData(data)
      .nodeLabel('name')
      .nodeColor(node => node.color);

    // 强行让相机在 1 秒后对准这两个点
    setTimeout(() => {
      Graph.zoomToFit(600);
    }, 1000);
  </script>
</body>
</html>
